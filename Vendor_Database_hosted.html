function expandCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.vendor-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!isExpanded) {
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => loadVotes(id), 100);
  }
}

async function supaFetch(path, options = {}) {
  const { headers: extraHeaders = {}, ...rest } = options;
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    ...rest,
    cache: 'no-store',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      ...extraHeaders
    }
  });
  if (!res.ok) {
    const err = await res.text().catch(() => '');
    console.warn('Supabase error:', res.status, err);
    return null;
  }
  const text = await res.text();
  try { return text ? JSON.parse(text) : null; } catch { return null; }
}

async function loadVotes(vendorId) {
  const countEl = document.getElementById('votes-' + vendorId);
  const commentsEl = document.getElementById('comments-' + vendorId);
  const previewEl = document.getElementById('vpreview-' + vendorId);
  if (!countEl && !previewEl) return;

  // Get vote counts
  const counts = await supaFetch('vendor_vote_counts?vendor_id=eq.' + encodeURIComponent(vendorId) + '&select=up_count,down_count');
  const up = counts && counts[0] ? counts[0].up_count : 0;
  const down = counts && counts[0] ? counts[0].down_count : 0;

  if (countEl) countEl.innerHTML = `
    <span class="vote-btn voted-up">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
      ${up}
    </span>
    <span class="vote-btn voted-down">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg>
      ${down}
    </span>
    <span style="font-size:11px;color:#bbb;">${up + down} rating${up + down !== 1 ? 's' : ''}</span>
  `;

  // Also update the collapsed card preview
  if (previewEl) {
    if (up === 0 && down === 0) {
      previewEl.innerHTML = '<span style="font-size:11px;color:#bbb;font-style:italic;">No ratings yet</span>';
    } else {
      previewEl.innerHTML =
        (up > 0 ? `<span class="vote-preview-pill has-up">👍 ${up}</span>` : '') +
        (down > 0 ? `<span class="vote-preview-pill has-down">👎 ${down}</span>` : '');
    }
  }

  // Get all votes with names (show even without comments)
  if (commentsEl) {
    const votes = await supaFetch('vendor_votes?vendor_id=eq.' + encodeURIComponent(vendorId) + '&order=created_at.desc&limit=10&select=vote,comment,reviewer_name,created_at');
    if (votes && votes.length) {
      commentsEl.innerHTML = votes.map(v => `
        <div class="vote-comment-item">
          <span class="vote-comment-icon ${v.vote}">${v.vote === 'up' ? '👍' : '👎'}</span>
          <div>
            ${v.reviewer_name ? `<span class="vote-comment-reviewer">${esc(v.reviewer_name)}</span>` : ''}
            ${v.comment ? `<span>${esc(v.comment)}</span>` : '<span style="color:#bbb;font-style:italic;">No comment left</span>'}
          </div>
        </div>`).join('');
    } else {
      commentsEl.innerHTML = '<div style="font-size:12px;color:#bbb;padding:6px 0;font-style:italic;">No ratings yet — be the first!</div>';
    }
  }
}

async function submitVote(vendorId, voteType) {
  const commentInput = document.getElementById('comment-' + vendorId);
  const reviewerInput = document.getElementById('reviewer-' + vendorId);
  const comment = commentInput ? commentInput.value.trim() : '';
  const reviewerName = reviewerInput ? reviewerInput.value.trim() : '';

  if (!reviewerName) {
    if (reviewerInput) {
      reviewerInput.style.borderColor = '#FD5247';
      reviewerInput.placeholder = 'Please enter your name first...';
      reviewerInput.focus();
      setTimeout(() => {
        reviewerInput.style.borderColor = '';
        reviewerInput.placeholder = 'Enter your name...';
      }, 2500);
    }
    return;
  }

  // Save name to localStorage so it persists
  localStorage.setItem('ern_reviewer_name', reviewerName);

  // Disable buttons while submitting
  const card = document.getElementById('card-' + vendorId);
  const btns = card ? card.querySelectorAll('.vote-submit') : [];
  btns.forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });

  // Insert vote record with reviewer name
  await supaFetch('vendor_votes', {
    method: 'POST',
    body: JSON.stringify({
      vendor_id: vendorId,
      vote: voteType,
      comment: comment || null,
      reviewer_name: reviewerName
    }),
    headers: { 'Prefer': 'return=minimal' }
  });

  // Get current counts then upsert
  const existing = await supaFetch('vendor_vote_counts?vendor_id=eq.' + encodeURIComponent(vendorId) + '&select=up_count,down_count');
  const cur = existing && existing[0] ? existing[0] : { up_count: 0, down_count: 0 };
  await supaFetch('vendor_vote_counts', {
    method: 'POST',
    body: JSON.stringify({
      vendor_id: vendorId,
      up_count: (cur.up_count || 0) + (voteType === 'up' ? 1 : 0),
      down_count: (cur.down_count || 0) + (voteType === 'down' ? 1 : 0)
    }),
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' }
  });

  if (commentInput) commentInput.value = '';
  btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
  await loadVotes(vendorId);
}

function loadSavedName(vendorId) {
  const saved = localStorage.getItem('ern_reviewer_name');
  if (saved) {
    const input = document.getElementById('reviewer-' + vendorId);
    if (input && !input.value) input.value = saved;
  }
}

function load() {
  try {
    const raw = localStorage.getItem('vendordb_vendors');
    const seedIds = new Set(SEED_VENDORS.map(v => v.id));
    if (raw) {
      const saved = JSON.parse(raw);
      // Keep seed vendors fresh from source, plus any user-added vendors (ids not in seed)
      const userAdded = saved.filter(v => !seedIds.has(v.id));
      vendors = [...SEED_VENDORS, ...userAdded];
    } else {
      vendors = [...SEED_VENDORS];
    }
    localStorage.setItem('vendordb_vendors', JSON.stringify(vendors));
  } catch(e) { vendors = [...SEED_VENDORS]; }
  buildTabs();
  // Don't render vendors on load — homepage shows only search + category grid
}

function save() {
  try { localStorage.setItem('vendordb_vendors', JSON.stringify(vendors)); } catch(e) {}
}

function colorFor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}

function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildTabs() {
  const usedCats = [...new Set(vendors.map(v => v.category).filter(Boolean))].sort();
  if (activeTab === 'all' && usedCats.length) activeTab = usedCats[0];
  const sel = document.getElementById('gotoSelect');
  if (sel) {
    sel.innerHTML = '<option value="">Browse by category...</option>' +
      usedCats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  }
}

function gotoCategory(sel) {
  const cat = sel.value;
  if (!cat) return;
  const scrollY = window.scrollY || document.documentElement.scrollTop;
  const scrollX = window.scrollX || document.documentElement.scrollLeft;
  sel.blur();
  document.getElementById('heroSection').classList.add('has-results');
  selectCat(cat);
  setTimeout(() => {
    sel.value = '';
    window.scrollTo({ top: scrollY, left: scrollX, behavior: 'instant' });
  }, 0);
  requestAnimationFrame(() => {
    window.scrollTo({ top: scrollY, left: scrollX, behavior: 'instant' });
  });
}

function setTabFromSelect(sel) {
  activeTab = sel.value;
  selectCat(activeTab);
}

function selectCat(cat) {
  activeTab = cat;
  document.getElementById('sectionTitle').textContent = cat;
  document.getElementById('searchInput').value = '';
  document.getElementById('heroSection').classList.add('has-results');
  buildTabs();
  renderVendors();
}

    document.getElementById('vendorHeader').style.display = 'none';
    document.getElementById('vendorGrid').innerHTML = '';

}

  const g = document.getElementById('vendorGrid');
  if (!list.length) {
    g.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>${vendors.length?'No vendors match your search.':'No vendors yet.'}</p></div>`;
    return;
  }
  g.innerHTML = list.map(v => {
    const av = colorFor(v.name);
    return `<div class="vendor-card" id="card-${esc(v.id)}" onclick="expandCard('${esc(v.id)}')">
      <div class="card-top">
        <div class="avatar ${av}">${initials(v.name)}</div>
        <div>
          <div class="vendor-name">${esc(v.name)}</div>
          ${v.category?`<div class="cat-badge">${esc(v.category)}</div>`:''}
        </div>
      </div>
      ${v.contact&&v.contact!==v.name?`<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${esc(v.contact)}</div>`:''}
      ${v.phone?`<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${esc(v.phone)}</div>`:''}
      ${v.email?`<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${esc(v.email)}</div>`:''}
      <div class="vote-preview" id="vpreview-\${esc(v.id)}">
        <span style="font-size:11px;color:#bbb;">Loading ratings...</span>
      </div>
      <div class="expanded-body">
        <div class="expanded-grid">
          ${v.address?`<div><div class="expanded-label">Address</div><div class="expanded-val">${esc(v.address)}</div></div>`:''}
          ${v.phone?`<div><div class="expanded-label">Phone</div><div class="expanded-val"><a href="tel:${esc(v.phone)}">${esc(v.phone)}</a></div></div>`:''}
          ${v.email?`<div><div class="expanded-label">Email</div><div class="expanded-val"><a href="mailto:${esc(v.email)}">${esc(v.email)}</a></div></div>`:''}
          ${v.website?`<div><div class="expanded-label">Website</div><div class="expanded-val"><a href="${esc(v.website)}" target="_blank">${esc(v.website)}</a></div></div>`:''}
          ${v.notes?`<div style="grid-column:1/-1"><div class="expanded-label">Notes</div><div class="expanded-val">${esc(v.notes)}</div></div>`:''}
        </div>
        <div class="vote-section" onclick="event.stopPropagation()">
          <div class="vote-counts" id="votes-\${esc(v.id)}">
            <span class="vote-loading">Loading ratings...</span>
          </div>
          <div class="vote-name-wrap">
            <span class="vote-name-label">Your name</span>
            <input class="vote-name-input" type="text" id="reviewer-\${esc(v.id)}" placeholder="Enter your name..." maxlength="60" onclick="event.stopPropagation()" onfocus="loadSavedName('\${esc(v.id)}')" />
          </div>
          <div class="vote-comment-wrap">
            <input class="vote-comment-input" type="text" id="comment-\${esc(v.id)}" placeholder="Leave a comment (optional)..." maxlength="200" onclick="event.stopPropagation()" />
            <button class="vote-submit" onclick="event.stopPropagation();submitVote('\${esc(v.id)}','up')">👍 Recommend</button>
            <button class="vote-submit" style="background:#a32d2d;" onclick="event.stopPropagation();submitVote('\${esc(v.id)}','down')">👎 Not recommend</button>
          </div>
          <div class="vote-comments-list" id="comments-\${esc(v.id)}"></div>
        </div>
        <div class="card-actions-row">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editCurrentFromCard('${esc(v.id)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit
          </button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteFromCard('${esc(v.id)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>Delete
          </button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();document.getElementById('card-${esc(v.id)}').classList.remove('expanded')">Collapse</button>
        </div>
      </div>
    </div>`;
  }).join('');
  // Load vote previews after DOM is updated
  setTimeout(() => list.forEach(v => loadVotes(v.id)), 300);
}

function openAdd() {
  editingId = null;
  document.getElementById('addModalTitle').textContent = 'Add Service Provider';
  document.getElementById('saveBtn').textContent = 'Save Service Provider';
  ['name','contact','phone','email','addr','notes','website'].forEach(f => {
    const el = document.getElementById('f-'+f);
    if (el) el.value = '';
  });
  const selectedCategory = (activeTab && activeTab !== 'all') ? activeTab : '';
  document.getElementById('f-cat').value = selectedCategory;
  document.getElementById('addModal').classList.add('open');
}

function saveVendor() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const v = {
    id: editingId || Date.now().toString(),
    name,
    contact: document.getElementById('f-contact').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    address: document.getElementById('f-addr').value.trim(),
    category: document.getElementById('f-cat').value,
    notes: document.getElementById('f-notes').value.trim(),
    website: document.getElementById('f-website').value.trim(),
  };
  if (editingId) {
    const i = vendors.findIndex(x => x.id === editingId);
    if (i > -1) vendors[i] = v;
  } else {
    vendors.push(v);
  }
  save(); buildTabs(); renderVendors();
  closeModal('addModal');
}

function viewVendor(id) {
  const v = vendors.find(x => x.id === id);
  if (!v) return;
  currentId = id;
  const av = colorFor(v.name);
  const rows = [
    v.contact && v.contact !== v.name ? ['<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>','Contact',esc(v.contact)] : null,
    v.phone ? ['<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>','Phone',`<a href="tel:${esc(v.phone)}">${esc(v.phone)}</a>`] : null,
    v.email ? ['<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>','Email',`<a href="mailto:${esc(v.email)}">${esc(v.email)}</a>`] : null,
    v.website ? ['<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>','Website',`<a href="${esc(v.website)}" target="_blank">${esc(v.website)}</a>`] : null,
    v.address ? ['<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>','Address',esc(v.address)] : null,
    v.category ? ['<path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>','Category',esc(v.category)] : null,
    v.notes ? ['<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>','Notes',esc(v.notes)] : null,
  ].filter(Boolean);
  document.getElementById('viewBody').innerHTML = `
    <div class="view-avatar ${av}">${initials(v.name)}</div>
    <div class="view-vendor-name">${esc(v.name)}</div>
    ${v.category?`<div class="cat-badge">${esc(v.category)}</div>`:''}
    <div class="view-rows">${rows.map(([path,label,val])=>`<div class="view-row"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">${path}</svg><div><div class="view-row-label">${label}</div><div class="view-row-val">${val}</div></div></div>`).join('')}</div>`;
  document.getElementById('viewModal').classList.add('open');
}

function editCurrentFromCard(id) {
  currentId = id;
  editCurrent();
}

function deleteFromCard(id) {
  currentId = id;
  deleteCurrent();
}

function editCurrent() {
  const v = vendors.find(x => x.id === currentId);
  if (!v) return;
  closeModal('viewModal');
  editingId = v.id;
  document.getElementById('addModalTitle').textContent = 'Edit Service Provider';
  document.getElementById('saveBtn').textContent = 'Update Service Provider';
  document.getElementById('f-name').value = v.name;
  document.getElementById('f-contact').value = v.contact||'';
  document.getElementById('f-phone').value = v.phone||'';
  document.getElementById('f-email').value = v.email||'';
  document.getElementById('f-addr').value = v.address||'';
  document.getElementById('f-cat').value = v.category||'';
  document.getElementById('f-notes').value = v.notes||'';
  document.getElementById('f-website').value = v.website||'';
  document.getElementById('addModal').classList.add('open');
}

function deleteCurrent() {
  if (!confirm('Delete this vendor? This cannot be undone.')) return;
  vendors = vendors.filter(x => x.id !== currentId);
  save(); buildTabs(); renderVendors();
  closeModal('viewModal');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openImport() {
  pendingImport = [];
  document.getElementById('importPreview').innerHTML = '';
  document.getElementById('importBtn').style.display = 'none';
  document.getElementById('csvFile').value = '';
  document.getElementById('importModal').classList.add('open');
}

function handleCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,''));
    const col = k => { const i = headers.indexOf(k); return i > -1 ? i : -1; };
    pendingImport = lines.slice(1).map(line => {
      const parts = line.split(',');
      const g = i => i > -1 ? (parts[i]||'').trim() : '';
      const nameIdx = col('name') > -1 ? col('name') : col('vendorname') > -1 ? col('vendorname') : 0;
      return { id: Date.now().toString()+Math.random(), name: g(nameIdx), contact: g(col('contact')>-1?col('contact'):col('contactname')), phone: g(col('phone')), email: g(col('email')), address: g(col('address')), category: g(col('category')), notes: g(col('notes')), website: g(col('website')) };
    }).filter(v => v.name);
    const prev = document.getElementById('importPreview');
    if (!pendingImport.length) { prev.innerHTML = `<p style="color:var(--red);font-size:13px;margin-top:8px">No valid rows found.</p>`; return; }
    prev.innerHTML = `<p style="font-size:12px;color:#aaa;margin-bottom:8px;margin-top:4px">Found ${pendingImport.length} vendor(s) ready to import:</p>` +
      pendingImport.slice(0,5).map(v=>`<div class="import-preview-item">${esc(v.name)}${v.category?` <span>· ${esc(v.category)}</span>`:''}</div>`).join('') +
      (pendingImport.length>5?`<p style="font-size:11px;color:#bbb;margin-top:6px">...and ${pendingImport.length-5} more</p>`:'');
    document.getElementById('importBtn').style.display = 'inline-flex';
  };
  reader.readAsText(file);
}

function confirmImport() {
  vendors = [...vendors, ...pendingImport];
  save(); buildTabs(); renderVendors();
  closeModal('importModal');
}

load();
</script>
</div>
